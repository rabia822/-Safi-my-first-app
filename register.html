<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #87CEEB; font-family: sans-serif; padding: 20px; }
        
        /* ይህ ነው መረጃውን ወደ ሳጥን የሚቀይረው */
        .main-container {
            background-color: white;
            padding: 30px;
            width: 500px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #043f57; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Student Registration</h2>
        <form action="save_student.php" method="POST">
            <label>Full Name:</label>
            <input type="text" name="name" required>

            <label>Student ID:</label>
            <input type="text" name="id" required>

            <label>Age:</label>
            <input type="number" name="age" required>

            <label>Sex:</label>
            <select name="sex">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Home Address:</label>
            <input type="text" name="address" required>

            <label>Department:</label>
            <select name="department">
                <option value="Computer Science">Computer Science</option>
                <option value="Business Administration">Business Administration</option>
                <option value="Accounting and Finance">Accounting and Finance</option>
                <option value="Nursing">Nursing</option>
                <option value="Management">Management</option>
            </select>
            
            <br><br>
            <button type="submit">Register Student</button>
        </form>
        <br>
        <a href="index.html">Back to Home</a>
    </div>

</body>
</html>
